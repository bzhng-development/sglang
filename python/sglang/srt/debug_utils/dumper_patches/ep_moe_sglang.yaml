# Source patcher YAML for SGLang EP MoE dump points.
# Covers: FusedMoE (StandardDispatcher), DeepEP Normal, DeepEP LL.
#
# Usage:
#   export DUMPER_SOURCE_PATCHER_CONFIG=.../debug_utils/dumper_patches/ep_moe_sglang.yaml
#
# All paths are patched unconditionally. Paths not reached at runtime
# incur zero overhead (patched __code__ is never invoked).

patches:
  # ── FusedMoE / fused_experts_impl ──────────────────────────────────

  # Dump sorted_token_ids + metadata after moe_align_block_size, and
  # intermediate activations before down projection.
  # (Previous patches targeted pre_permute_standard_to_triton and
  # TritonRunnerCore.run which are dead code for the BF16 fused_func path.)
  - target: sglang.srt.layers.moe.fused_moe_triton.fused_moe.fused_experts_impl
    edits:
      # After moe_align_block_size creates sorted_token_ids (append = after match)
      - match: |
          sorted_token_ids, expert_ids, num_tokens_post_padded = moe_align_block_size(
              curr_topk_ids, config["BLOCK_SIZE_M"], E
          )
        append: |
          dumper.dump("fused_moe_sorted_token_ids", sorted_token_ids)
          dumper.dump("fused_moe_ep_num_tokens", torch.tensor(tokens_in_chunk))
          dumper.dump("fused_moe_ep_top_k", torch.tensor(topk))

      # Before down projection (second invoke_fused_moe_kernel call).
      # This match is unique because the first call uses curr_hidden_states/w1.
      - match: |
          invoke_fused_moe_kernel(
              intermediate_cache2,
              w2,
        prepend: |
          dumper.dump("fused_moe_post_activation", intermediate_cache2,
                      dims="t_k[ep] h_inter # tp:replicated")

  # ── DeepEP Normal ──────────────────────────────────────────────────

  # Dump dispatch metadata from DeepEP Normal path
  - target: sglang.srt.layers.moe.token_dispatcher.deepep._DeepEPDispatcherImplNormal.dispatch_b
    edits:
      - match: "return DeepEPNormalDispatchOutput("
        prepend: |
          dumper.dump("deepep_normal_recv_topk_ids", topk_ids,
                      dims="t_recv[ep] k")
          dumper.dump("deepep_normal_num_recv_tokens_per_expert",
                      num_recv_tokens_per_expert, dims="num_experts")
          dumper.dump("deepep_normal_ep_num_tokens", torch.tensor(hidden_states.shape[0] if not isinstance(hidden_states, tuple) else hidden_states[0].shape[0]))
          dumper.dump("deepep_normal_ep_top_k", torch.tensor(topk_ids.shape[1]))

  # Dump contiguous GEMM activations (DeepEP Normal uses contiguous path)
  - target: sglang.srt.layers.moe.moe_runner.deep_gemm.DeepGemmRunnerCore._run_contiguous_gemm
    edits:
      # After gate+up GEMM, before activation
      - match: "silu_and_mul(gateup_output.view(-1, N), down_input)"
        prepend: |
          dumper.dump("deepep_normal_post_gateup", gateup_output,
                      dims="t_recv[ep] h_inter_2 # tp:replicated")
      # After down GEMM
      - match: "return down_output"
        prepend: |
          dumper.dump("deepep_normal_post_down", down_output,
                      dims="t_recv[ep] h # tp:replicated")

  # ── DeepEP Low-Latency ─────────────────────────────────────────────

  # Dump dispatch metadata from DeepEP LL path
  - target: sglang.srt.layers.moe.token_dispatcher.deepep._DeepEPDispatcherImplLowLatency.dispatch_b
    edits:
      - match: "deepep_output = DeepEPLLDispatchOutput("
        prepend: |
          dumper.dump("deepep_ll_masked_m", masked_m, dims="num_experts")
          dumper.dump("deepep_ll_packed_recv_src_info",
                      torch.stack(list(self.handle[0])),
                      dims="num_experts expected_m")
          dumper.dump("deepep_ll_ep_num_tokens", torch.tensor(hidden_states.shape[0] if not isinstance(hidden_states, tuple) else hidden_states[0].shape[0]))
          dumper.dump("deepep_ll_ep_top_k", torch.tensor(topk_ids.shape[1]))

  # Dump masked GEMM activations (DeepEP LL uses masked path)
  - target: sglang.srt.layers.moe.moe_runner.deep_gemm.DeepGemmRunnerCore._run_masked_gemm
    edits:
      # Dump gateup_output before activation branch (fast/slow path both consume it).
      # "if _MASKED_GEMM_FAST_ACT:" is the branch point — dump before it.
      - match: "if _MASKED_GEMM_FAST_ACT:"
        prepend: |
          dumper.dump("deepep_ll_post_gateup", gateup_output,
                      dims="num_experts[ep] m h_inter_2 # tp:replicated")
      # After down GEMM
      - match: "return down_output"
        prepend: |
          dumper.dump("deepep_ll_post_down", down_output,
                      dims="num_experts[ep] m h # tp:replicated")
