# Source patcher YAML for SGLang EP MoE dump points.
# Covers: FusedMoE (StandardDispatcher), DeepEP Normal, DeepEP LL.
#
# Usage:
#   export DUMPER_SOURCE_PATCHER_CONFIG=.../debug_utils/dumper_patches/ep_moe_sglang.yaml
#
# All paths are patched unconditionally. Paths not reached at runtime
# incur zero overhead (patched __code__ is never invoked).

patches:
  # ── FusedMoE / StandardDispatcher ──────────────────────────────────

  # Dump sorted_token_ids after moe_align_block_size
  - target: sglang.srt.layers.moe.moe_runner.triton.pre_permute_standard_to_triton
    edits:
      - match: "return TritonRunnerInput("
        prepend: |
          dumper.dump_tensor("sorted_token_ids", sorted_token_ids,
                            dims="t_padded",
                            ep_dispatch_path="fused_moe")

  # Dump intermediate activations in TritonRunnerCore.run
  - target: sglang.srt.layers.moe.moe_runner.triton.TritonRunnerCore.run
    edits:
      # After first GEMM (gate+up projection)
      - match: "intermediate_cache2 = torch.empty("
        prepend: |
          dumper.dump_tensor("fused_moe_after_gemm1", intermediate_cache1,
                            dims="t k(ep) n // ep:replicated",
                            ep_dispatch_path="fused_moe")
      # After activation
      - match: "intermediate_cache3 = torch.empty("
        prepend: |
          dumper.dump_tensor("fused_moe_after_activation", intermediate_cache2,
                            dims="t_k(ep) n_half // ep:replicated",
                            ep_dispatch_path="fused_moe")
      # After down projection
      - match: "return TritonRunnerOutput("
        prepend: |
          dumper.dump_tensor("fused_moe_after_gemm2", out_hidden_states,
                            dims="t h(ep) // ep:replicated",
                            ep_dispatch_path="fused_moe")

  # ── DeepEP Normal ──────────────────────────────────────────────────

  # Dump dispatch metadata from DeepEP Normal path
  - target: sglang.srt.layers.moe.token_dispatcher.deepep._DeepEPDispatcherImplNormal.dispatch_b
    edits:
      - match: "return DeepEPNormalDispatchOutput("
        prepend: |
          dumper.dump_tensor("deepep_normal_recv_topk_ids", topk_ids,
                            dims="t_recv k(ep) // ep:replicated",
                            ep_dispatch_path="deepep_normal")
          dumper.dump_tensor("deepep_normal_num_recv_tokens_per_expert",
                            torch.tensor(num_recv_tokens_per_expert),
                            dims="e(ep)",
                            ep_dispatch_path="deepep_normal")

  # Dump contiguous GEMM activations (DeepEP Normal uses contiguous path)
  - target: sglang.srt.layers.moe.moe_runner.deep_gemm.DeepGemmRunnerCore._run_contiguous_gemm
    edits:
      # After gate+up GEMM
      - match: "silu_and_mul("
        prepend: |
          dumper.dump_tensor("deepep_normal_after_gemm1", gateup_output,
                            dims="t_recv(ep) n // ep:replicated",
                            ep_dispatch_path="deepep_normal")
      # After down GEMM
      - match: "return down_output"
        prepend: |
          dumper.dump_tensor("deepep_normal_after_gemm2", down_output,
                            dims="t_recv(ep) h // ep:replicated",
                            ep_dispatch_path="deepep_normal")

  # ── DeepEP Low-Latency ─────────────────────────────────────────────

  # Dump dispatch metadata from DeepEP LL path
  - target: sglang.srt.layers.moe.token_dispatcher.deepep._DeepEPDispatcherImplLowLatency.dispatch_b
    edits:
      - match: "return DeepEPLLDispatchOutput("
        prepend: |
          dumper.dump_tensor("deepep_ll_masked_m", masked_m,
                            dims="e(ep)",
                            ep_dispatch_path="deepep_ll")

  # Dump masked GEMM activations (DeepEP LL uses masked path)
  - target: sglang.srt.layers.moe.moe_runner.deep_gemm.DeepGemmRunnerCore._run_masked_gemm
    edits:
      # After gate+up GEMM
      - match: "silu_and_mul("
        prepend: |
          dumper.dump_tensor("deepep_ll_after_gemm1", gateup_output,
                            dims="e(ep) m n // ep:replicated",
                            ep_dispatch_path="deepep_ll")
      # After down GEMM
      - match: "return down_output"
        prepend: |
          dumper.dump_tensor("deepep_ll_after_gemm2", down_output,
                            dims="e(ep) m h // ep:replicated",
                            ep_dispatch_path="deepep_ll")
